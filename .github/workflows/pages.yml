name: Deploy .docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate docs manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          root = Path('.docs')
          priority = ['Overview.md', 'Orign.md', 'README.md']
          docs = sorted(
              [p.name for p in root.glob('*.md')],
              key=lambda name: ((priority.index(name) if name in priority else 999), name.lower()),
          )
          (root / 'docs-manifest.json').write_text(json.dumps({'docs': docs}, indent=2) + '\n')
          print('Generated docs-manifest.json for', len(docs), 'docs files')
          PY

      - name: Upload .docs artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
